<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Tiffin Route</title>
<style>
  :root{
    --turmeric:#e8a72e; --brick:#a8432a; --monsoon:#5b7a4b; --dusk:#f2c879;
    --indigo:#1a1b3a; --lantern:#ffcf7a; --ink:#2b1d12; --paper:#f4e7cf;
    --tin:#cdd2d6; --tin-dark:#8b9398;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0c0a12;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#f4e7cf;-webkit-font-smoothing:antialiased}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#241a2e 0%,#0c0a12 80%)}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  #game{box-shadow:0 0 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04)}

  /* ---------- generic overlay ---------- */
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.show{display:flex}

  /* ---------- title ---------- */
  #title{flex-direction:column;background:radial-gradient(ellipse at 50% 40%,#3a2342 0%,#120c1a 75%);z-index:60}
  #title h1{font-size:clamp(34px,7vw,76px);letter-spacing:.04em;color:var(--dusk);
    text-shadow:0 2px 0 #7a3b1e,0 0 30px rgba(232,167,46,.35);font-weight:800;margin-bottom:.1em}
  #title .sub{color:#caa;letter-spacing:.45em;text-transform:uppercase;font-size:clamp(10px,1.6vw,14px);margin-bottom:2.2em;opacity:.8}
  .menu{display:flex;flex-direction:column;gap:12px;width:min(330px,80vw)}
  .btn{background:rgba(244,231,207,.06);border:1px solid rgba(244,231,207,.25);color:var(--paper);
    padding:13px 18px;border-radius:10px;font-size:16px;cursor:pointer;letter-spacing:.03em;
    transition:.15s;backdrop-filter:blur(2px);text-align:center}
  .btn:hover{background:rgba(232,167,46,.18);border-color:var(--turmeric);transform:translateY(-1px)}
  .btn:disabled{opacity:.35;cursor:default;transform:none}
  .btn.primary{background:linear-gradient(180deg,#e8a72e,#c2731f);color:#2b1d12;border:none;font-weight:700}
  .btn.primary:hover{filter:brightness(1.08)}
  #title .credit{position:absolute;bottom:16px;font-size:11px;color:rgba(244,231,207,.4);letter-spacing:.1em}

  /* ---------- cinematic ---------- */
  #cine{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#06040a;z-index:70;flex-direction:column;cursor:pointer}
  #cine.show{display:flex}
  #cineArt{position:absolute;inset:0;opacity:.5;background-size:cover;background-position:center;transition:opacity 1.4s, transform 9s ease-out}
  #cineVeil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,4,10,.2),rgba(6,4,10,.85))}
  #cineText{position:relative;max-width:760px;padding:0 28px;text-align:center;font-size:clamp(18px,2.6vw,27px);
    line-height:1.65;color:#f4e7cf;text-shadow:0 2px 14px #000;opacity:0;transition:opacity 1.1s}
  #cineText.in{opacity:1}
  #cineHint{position:absolute;bottom:26px;right:30px;font-size:12px;letter-spacing:.18em;color:rgba(244,231,207,.5);text-transform:uppercase}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:20;display:none;font-size:13px}
  #hud.show{display:block}
  #hudTop{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px;
    background:linear-gradient(180deg,rgba(8,6,14,.55),transparent)}
  .clockWrap{display:flex;align-items:center;gap:10px}
  #clockOrb{width:30px;height:30px;border-radius:50%;box-shadow:0 0 14px;transition:.6s}
  .day #clockOrb{background:radial-gradient(circle at 35% 35%,#ffe6a8,#e8a72e);box-shadow:0 0 16px rgba(232,167,46,.8)}
  .night #clockOrb{background:radial-gradient(circle at 35% 35%,#cfe0ff,#6f7bd6);box-shadow:0 0 16px rgba(120,140,230,.8)}
  #clockText b{color:var(--dusk);font-weight:700}
  #clockText small{display:block;opacity:.7;letter-spacing:.18em;text-transform:uppercase;font-size:10px}
  #stats{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;max-width:60%}
  .stat{display:flex;align-items:center;gap:5px;background:rgba(12,9,18,.5);border:1px solid rgba(244,231,207,.12);
    border-radius:7px;padding:4px 8px}
  .stat .dot{width:8px;height:8px;border-radius:50%}
  .stat .pips{display:flex;gap:2px}
  .stat .pip{width:5px;height:5px;border-radius:1px;background:rgba(244,231,207,.18)}
  .stat .pip.on{background:#fff}
  .stat .nm{font-size:10px;letter-spacing:.06em;opacity:.85}
  #hudBottom{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-end;
    background:linear-gradient(0deg,rgba(8,6,14,.5),transparent)}
  #objective{background:rgba(12,9,18,.55);border:1px solid rgba(244,231,207,.14);border-left:3px solid var(--turmeric);
    border-radius:8px;padding:8px 12px;max-width:62%}
  #objective .lbl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--turmeric);margin-bottom:2px}
  #keys{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .key{background:rgba(12,9,18,.5);border:1px solid rgba(244,231,207,.14);border-radius:6px;padding:4px 8px;font-size:11px}
  .key b{color:var(--dusk)}
  #toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);opacity:0;transition:.4s;
    background:rgba(12,9,18,.82);border:1px solid var(--turmeric);border-radius:9px;padding:9px 16px;color:var(--dusk);
    font-size:13px;letter-spacing:.02em;max-width:80%;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #interactPrompt{position:absolute;opacity:0;transition:.15s;pointer-events:none;transform:translate(-50%,-100%);
    background:var(--turmeric);color:#2b1d12;font-weight:700;font-size:11px;padding:3px 8px;border-radius:6px;white-space:nowrap}
  #interactPrompt.show{opacity:1}
  #interactPrompt:after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--turmeric)}

  /* ---------- dialogue ---------- */
  #dlg{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;justify-content:flex-end;
    background:linear-gradient(0deg,rgba(6,4,10,.45),transparent 55%)}
  #dlg.show{display:flex}
  #dlgVoices{padding:0 max(14px,calc(50vw - 430px)) 6px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .voice{align-self:flex-start;max-width:min(560px,84vw);background:rgba(10,8,16,.7);border-radius:9px;padding:7px 12px;
    font-style:italic;font-size:14px;line-height:1.45;border-left:3px solid;animation:vin .35s ease}
  .voice .vn{font-style:normal;font-weight:800;font-size:10px;letter-spacing:.16em;margin-right:7px;opacity:.95}
  @keyframes vin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  #dlgBox{background:linear-gradient(180deg,#1d2226,#12161a);border-top:2px solid var(--tin-dark);
    box-shadow:0 -10px 40px rgba(0,0,0,.5);padding:16px max(16px,calc(50vw - 430px)) 18px;position:relative}
  #dlgBox:before{content:"";position:absolute;top:-2px;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--turmeric),transparent)}
  .speakerRow{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  #portrait{width:52px;height:52px;border-radius:9px;background:#0c0a12;border:2px solid var(--tin-dark);flex:none;image-rendering:pixelated}
  #speaker{font-weight:800;letter-spacing:.03em;font-size:16px;color:var(--dusk)}
  #speaker.spirit{color:#bcd0ff;text-shadow:0 0 12px rgba(150,180,255,.6)}
  #speaker .ttl{display:block;font-size:11px;font-weight:500;letter-spacing:.1em;color:rgba(244,231,207,.55);text-transform:uppercase}
  #dlgText{font-size:clamp(16px,2vw,19px);line-height:1.6;min-height:3.2em;color:#f4e7cf}
  #dlgText.narr{font-style:italic;color:#d8c8e6}
  #choices{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .choice{background:rgba(244,231,207,.05);border:1px solid rgba(244,231,207,.18);color:#f4e7cf;text-align:left;
    padding:11px 14px;border-radius:9px;cursor:pointer;font-size:15px;line-height:1.4;transition:.13s}
  .choice:hover{background:rgba(232,167,46,.16);border-color:var(--turmeric);transform:translateX(3px)}
  .choice .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.08em;padding:1px 7px;border-radius:5px;margin-right:8px;vertical-align:middle}
  .choice.locked{opacity:.62}
  .choice.locked:hover{transform:none}
  #continueHint{margin-top:12px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,231,207,.5);text-align:right}

  /* ---------- journal ---------- */
  #journal{position:fixed;inset:0;z-index:40;display:none;background:rgba(6,4,10,.86);backdrop-filter:blur(3px);
    align-items:center;justify-content:center}
  #journal.show{display:flex}
  .jbook{width:min(840px,92vw);max-height:88vh;background:linear-gradient(180deg,#2a1d12,#1c130b);
    border:1px solid rgba(232,167,46,.3);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .jhead{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid rgba(232,167,46,.2);
    background:rgba(0,0,0,.2)}
  .jhead h2{color:var(--dusk);letter-spacing:.04em;font-size:22px}
  .jtabs{display:flex;gap:6px;padding:12px 22px 0}
  .jtab{background:transparent;border:none;color:rgba(244,231,207,.6);padding:7px 14px;border-radius:8px 8px 0 0;cursor:pointer;font-size:14px}
  .jtab.active{background:rgba(232,167,46,.16);color:var(--dusk)}
  .jbody{padding:14px 22px 22px;overflow-y:auto}
  .routeCard{background:rgba(244,231,207,.04);border:1px solid rgba(244,231,207,.1);border-radius:11px;padding:14px 16px;margin-bottom:12px}
  .routeCard .rc-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .rc-av{width:40px;height:40px;border-radius:8px;image-rendering:pixelated;border:1px solid rgba(255,255,255,.1)}
  .rc-name{font-weight:700;color:var(--dusk);font-size:16px}
  .rc-name .t{display:block;font-size:11px;font-weight:400;color:rgba(244,231,207,.5);letter-spacing:.08em}
  .rc-badge{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 10px;border-radius:20px}
  .b-new{background:rgba(244,231,207,.12);color:#cbb}
  .b-prog{background:rgba(232,167,46,.2);color:var(--dusk)}
  .b-spirit{background:rgba(120,140,230,.22);color:#bcd0ff}
  .b-done{background:rgba(91,122,75,.3);color:#bfe0a8}
  .rc-track{display:flex;gap:4px;margin:8px 0}
  .rc-step{flex:1;height:5px;border-radius:3px;background:rgba(244,231,207,.12)}
  .rc-step.on{background:var(--turmeric)}
  .rc-step.spirit{background:#8fa6ff}
  .rc-notes{list-style:none;margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .rc-notes li{font-size:13px;color:rgba(244,231,207,.82);padding-left:16px;position:relative;line-height:1.45}
  .rc-notes li:before{content:"•";position:absolute;left:2px;color:var(--turmeric)}
  .skillCard{display:flex;gap:14px;align-items:flex-start;background:rgba(244,231,207,.04);border-radius:11px;padding:13px 15px;margin-bottom:10px;border:1px solid rgba(244,231,207,.08)}
  .skillCard .sk-orb{width:34px;height:34px;border-radius:50%;flex:none;margin-top:2px;box-shadow:0 0 12px}
  .skillCard .sk-nm{font-weight:800;letter-spacing:.1em;font-size:14px}
  .skillCard .sk-pips{display:flex;gap:3px;margin:5px 0 7px}
  .skillCard .sk-pips i{width:9px;height:9px;border-radius:2px;background:rgba(244,231,207,.16)}
  .skillCard .sk-desc{font-size:13px;font-style:italic;color:rgba(244,231,207,.75);line-height:1.45}

  /* pause / generic small */
  .center{text-align:center}
  .muted{color:rgba(244,231,207,.55)}
  #fade{position:fixed;inset:0;background:#06040a;z-index:80;opacity:0;pointer-events:none;transition:opacity .6s}
  #fade.show{opacity:1}
  .hideCursor{cursor:none}
  @media (max-width:560px){
    #keys{display:none}
    #objective{max-width:90%}
  }

  /* ---- touch / settings controls ---- */
  #touchUI{position:fixed;z-index:26;right:12px;bottom:54px;display:none;flex-direction:column;gap:9px}
  #touchUI.show{display:flex}
  #touchUI .tb{width:48px;height:48px;border-radius:13px;background:rgba(12,9,18,.62);border:1px solid rgba(244,231,207,.28);
    color:var(--dusk);font-size:21px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(3px);user-select:none}
  #touchUI .tb:active,#touchUI .tb:hover{background:rgba(232,167,46,.22);border-color:var(--turmeric)}
  #settings .panel{background:linear-gradient(180deg,#241a2e,#120c1a);border:1px solid rgba(232,167,46,.3);border-radius:16px;
    padding:24px;width:min(330px,86vw);display:flex;flex-direction:column;gap:11px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  #settings h2{color:var(--dusk);text-align:center;margin-bottom:4px;letter-spacing:.04em}
</style>
</head>
<body>
<div id="stage"><canvas id="game" width="480" height="270"></canvas></div>

<!-- HUD -->
<div id="hud" class="day">
  <div id="hudTop">
    <div class="clockWrap">
      <div id="clockOrb"></div>
      <div id="clockText"><b id="dayLabel">Day 1</b><small id="phaseLabel">Morning Route</small></div>
    </div>
    <div id="stats"></div>
  </div>
  <div id="toast"></div>
  <div id="interactPrompt">E · Deliver</div>
  <div id="hudBottom">
    <div id="objective"><div class="lbl">Route</div><div id="objText">Find the families on Babulal's old route.</div></div>
    <div id="keys">
      <span class="key"><b>WASD</b> Move</span>
      <span class="key"><b>E</b> Talk</span>
      <span class="key"><b>J</b> Journal</span>
      <span class="key"><b>R</b> Rest</span>
    </div>
  </div>
</div>

<!-- Dialogue -->
<div id="dlg">
  <div id="dlgVoices"></div>
  <div id="dlgBox">
    <div class="speakerRow">
      <canvas id="portrait" width="48" height="48"></canvas>
      <div id="speaker"></div>
    </div>
    <div id="dlgText"></div>
    <div id="choices"></div>
    <div id="continueHint">Space / Click to continue ▸</div>
  </div>
</div>

<!-- Journal -->
<div id="journal">
  <div class="jbook">
    <div class="jhead"><h2>Route Journal</h2><button class="btn" style="padding:6px 14px" onclick="Journal.close()">Close ✕</button></div>
    <div class="jtabs">
      <button class="jtab active" data-tab="routes" onclick="Journal.tab('routes')">The Route</button>
      <button class="jtab" data-tab="skills" onclick="Journal.tab('skills')">Inner Voices</button>
    </div>
    <div class="jbody" id="jbody"></div>
  </div>
</div>

<!-- Cinematic -->
<div id="cine">
  <div id="cineArt"></div><div id="cineVeil"></div>
  <div id="cineText"></div>
  <div id="cineHint">Click / Space ▸</div>
</div>

<!-- Title -->
<div id="title" class="overlay show">
  <h1>The Tiffin Route</h1>
  <div class="sub">A delivery between two worlds</div>
  <div class="menu">
    <button class="btn primary" id="btnNew" onclick="Game.newGame()">New Route</button>
    <button class="btn" id="btnContinue" onclick="Game.continueGame()" disabled>Continue</button>
    <button class="btn" id="btnAbout" onclick="Cine.about()">About</button>
  </div>
  <div class="credit">Pixel · narrative · India — single-file build</div>
</div>

<!-- touch controls + settings -->
<div id="touchUI">
  <div class="tb" id="tbSet" title="Settings">⚙</div>
  <div class="tb" id="tbJournal" title="Journal (J)">☰</div>
  <div class="tb" id="tbRest" title="Rest (R)">☾</div>
</div>
<div id="settings" class="overlay">
  <div class="panel">
    <h2>Paused</h2>
    <button class="btn primary" id="btnResume">Resume</button>
    <button class="btn" id="btnMute">Sound: On</button>
    <button class="btn" id="btnTitle">Back to Title</button>
  </div>
</div>

<div id="fade"></div>

<script>
"use strict";
/* ============================================================
   THE TIFFIN ROUTE  —  self-contained web build
   Data ported verbatim from npc_data.json / skill_voices.json
   ============================================================ */
const NPC_DATA = {
  "mrs_mehta": {
    "name": "Mrs. Mehta",
    "title": "The Widow of Flat 4B",
    "portrait_day": "res://assets/sprites/npcs/mrs_mehta_portrait.png",
    "portrait_spirit": "res://assets/sprites/npcs/mrs_mehta_spirit_portrait.png",
    "spawn_location_day": {"x": 180, "y": 95},
    "spawn_location_night": {"x": 180, "y": 95},
    "dialogue_trees": {

      "first_meeting": {
        "start": "m1_arrive",
        "nodes": {
          "m1_arrive": {
            "speaker": "Mrs. Mehta",
            "text": "Ah. You're early today. Your baba used to come at this time too.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "She called him 'your baba' — she knew your grandfather. The grief in her voice isn't about you.", "requires_stat": 0}
            ],
            "choices": [
              {"id": "c1a", "text": "You knew my grandfather?", "stat_check": null, "next": "m1_knew_baba", "effects": {}},
              {"id": "c1b", "text": "Sorry for the trouble. Here's your tiffin.", "stat_check": null, "next": "m1_just_tiffin", "effects": {}}
            ]
          },
          "m1_knew_baba": {
            "speaker": "Mrs. Mehta",
            "text": "Forty years, your baba brought tiffin to this building. He knew everyone's order by heart. He knew my husband liked extra methi.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "Your husband — does he still live here?", "stat_check": null, "next": "m1_husband_question", "effects": {}}
            ]
          },
          "m1_husband_question": {
            "speaker": "Mrs. Mehta",
            "text": "He did. Until three months ago.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "Three months. The number people use when it's too new to say 'he passed away' casually but too old to still be crying openly.", "requires_stat": 0}
            ],
            "choices": [
              {"id": "c3a", "text": "I'm sorry. I didn't know.", "stat_check": null, "next": "m1_sorry", "effects": {"route_update": {"trust_level": 1}, "stat_modify": {"EMPATHY": 1}, "add_note": "Husband passed away 3 months ago. She knew Baba."}},
              {"id": "c3b", "text": "[EMPATHY 2] She needs someone to sit with this, not rush past it.", "stat_check": {"skill": "EMPATHY", "threshold": 2}, "next": "m1_empathy_sit", "fail_next": "m1_sorry", "effects": {"route_update": {"trust_level": 1}, "stat_modify": {"EMPATHY": 1}, "add_note": "Husband passed away 3 months ago. She still sets out his plate."}}
            ]
          },
          "m1_sorry": {
            "speaker": "Mrs. Mehta",
            "text": "No, no. How would you know? Come again tomorrow. I'll leave the container outside.",
            "voice_interjections": [],
            "choices": [],
            "next": "END",
            "effects": {"route_update": {"day_state": 1}}
          },
          "m1_empathy_sit": {
            "speaker": "Mrs. Mehta",
            "text": "Some days I still put out two cups for tea. Muscle memory, you know? Thirty-two years.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "Thirty-two years of the same morning. She's not just grieving a person — she's grieving a whole shape of life.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c4a", "text": "That sounds... right, actually. To remember in your hands.", "stat_check": null, "next": "m1_empathy_end", "effects": {"route_update": {"day_state": 1, "trust_level": 1}, "stat_modify": {"GRIEF": 1}}}
            ]
          },
          "m1_empathy_end": {
            "speaker": "Mrs. Mehta",
            "text": "Yes. Yes, exactly. Come again tomorrow, beta. I'll have the container ready.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "m1_just_tiffin": {
            "speaker": "Mrs. Mehta",
            "text": "No trouble. You're doing your family's work. That's a good thing.",
            "voice_interjections": [],
            "choices": [],
            "next": "END",
            "effects": {"route_update": {"day_state": 1}}
          }
        }
      },

      "developing": {
        "start": "m2_greeting",
        "nodes": {
          "m2_greeting": {
            "speaker": "Mrs. Mehta",
            "text": "I found some of his old photographs last night. I hadn't opened that box in years.",
            "voice_interjections": [
              {"skill": "NOSE", "text": "Old paper and dried marigold. She's been going through his things.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "How was that?", "stat_check": null, "next": "m2_photos_hard", "effects": {}},
              {"id": "c1b", "text": "[EMPATHY 2] Was there one that surprised you?", "stat_check": {"skill": "EMPATHY", "threshold": 2}, "next": "m2_photos_surprise", "fail_next": "m2_photos_hard", "effects": {}}
            ]
          },
          "m2_photos_hard": {
            "speaker": "Mrs. Mehta",
            "text": "Hard. But also — he looked so young in them. I forgot he was ever that young.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "What was he like?", "stat_check": null, "next": "m2_husband_character", "effects": {}}
            ]
          },
          "m2_photos_surprise": {
            "speaker": "Mrs. Mehta",
            "text": "There was one from before we were married. He's looking at the camera but his mind is somewhere else entirely. I never knew what he was thinking in that photograph. I never asked.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "The regret of the unanswered question. The thing you can no longer ask.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "That sounds like something he left behind for you to wonder about.", "stat_check": null, "next": "m2_husband_character", "effects": {"route_update": {"trust_level": 2}, "add_note": "She found an old photo — something in it she never understood. A question she can't ask anymore."}}
            ]
          },
          "m2_husband_character": {
            "speaker": "Mrs. Mehta",
            "text": "He was stubborn. And quiet about the important things. Very quiet. I wonder now if there were things he never said.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "She's circling something. This isn't just reminiscing — she's carrying an unasked question.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c3a", "text": "Maybe he said them in other ways.", "stat_check": null, "next": "m2_end_warm", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}}},
              {"id": "c3b", "text": "[GRIEF 1] Maybe some things are said in silences.", "stat_check": {"skill": "GRIEF", "threshold": 1}, "next": "m2_end_grief", "fail_next": "m2_end_warm", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}, "stat_modify": {"EMPATHY": 1}}}
            ]
          },
          "m2_end_warm": {
            "speaker": "Mrs. Mehta",
            "text": "Maybe. Take the tiffin box back tomorrow when you come. I'll wash it tonight.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "m2_end_grief": {
            "speaker": "Mrs. Mehta",
            "text": "...Yes. I think you're right. Some things only make sense later, when you're listening differently.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "trust": {
        "start": "m3_letter",
        "nodes": {
          "m3_letter": {
            "speaker": "Mrs. Mehta",
            "text": "I found a letter today. In his coat pocket — the one he wore to the hospital the last time. He never gave it to me.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "She's holding herself very still. This is the thing she's been building toward.", "requires_stat": 2},
              {"skill": "GRIEF", "text": "The letter that didn't arrive. The words that never made the crossing.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "Have you read it?", "stat_check": null, "next": "m3_read_it", "effects": {}}
            ]
          },
          "m3_read_it": {
            "speaker": "Mrs. Mehta",
            "text": "Not yet. I've been carrying it for three days. I don't know if I'm afraid he said something wonderful or something I can't bear to know.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "Either way, the letter will change things. She needs to know that's okay.", "requires_stat": 3}
            ],
            "choices": [
              {"id": "c2a", "text": "Both things can be true at once.", "stat_check": null, "next": "m3_end", "effects": {}},
              {"id": "c2b", "text": "[EMPATHY 3] Whatever it says — it's from him. That's what matters.", "stat_check": {"skill": "EMPATHY", "threshold": 3}, "next": "m3_end_empathy", "fail_next": "m3_end", "effects": {"route_update": {"trust_level": 3, "day_state": 3}, "add_note": "She found his unsent letter. She hasn't read it yet. Spirit world: the letter waits."}}
            ]
          },
          "m3_end": {
            "speaker": "Mrs. Mehta",
            "text": "...I'll read it tonight. Come tomorrow.",
            "voice_interjections": [],
            "choices": [],
            "next": "END",
            "effects": {"route_update": {"day_state": 3}}
          },
          "m3_end_empathy": {
            "speaker": "Mrs. Mehta",
            "text": "Yes. Yes. It's from him. Whatever he said — it was him saying it. That's enough.",
            "voice_interjections": [],
            "choices": [],
            "next": "END",
            "effects": {"route_update": {"trust_level": 3, "day_state": 3}}
          }
        }
      },

      "spirit_not_ready": {
        "start": "sn_1",
        "nodes": {
          "sn_1": {
            "speaker": null,
            "text": "A shape stands in the lantern light. She doesn't see you yet. Or perhaps she doesn't want to.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_intro": {
        "start": "si_1",
        "nodes": {
          "si_1": {
            "speaker": "NARRATOR",
            "text": "The streets look the same, but the light falls differently here — gold through indigo, everything a little further away. She stands by the window of what used to be Flat 4B. She's holding something.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "You recognise this version of her. More transparent. The part that stays up when everything else has gone to sleep.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "Mrs. Mehta?", "stat_check": null, "next": "si_2", "effects": {}}
            ]
          },
          "si_2": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "Oh. You're one of the ones who can see. Your grandfather could too, you know. He used to bring us what we needed without knowing it.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "What are you holding?", "stat_check": null, "next": "si_3", "effects": {"route_update": {"spirit_state": 1}}}
            ]
          },
          "si_3": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "His letter. I've been holding it in both worlds. I still can't open it.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "She can't do it alone. That's why she's still here.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c3a", "text": "I can stay while you open it.", "stat_check": null, "next": "si_end", "effects": {}},
              {"id": "c3b", "text": "[GRIEF 2] Some letters need a witness.", "stat_check": {"skill": "GRIEF", "threshold": 2}, "next": "si_end_grief", "fail_next": "si_end", "effects": {}}
            ]
          },
          "si_end": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "Come again tomorrow night. I think I'll be ready then.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "si_end_grief": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "A witness. Yes. I never thought of it that way. Come back. Tomorrow night, I'll read it.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_resolution": {
        "start": "sr_1",
        "nodes": {
          "sr_1": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "You came back. Good. I have the letter.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "She's not shaking anymore. She's decided.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "I'm here. Whenever you're ready.", "stat_check": null, "next": "sr_2", "effects": {}}
            ]
          },
          "sr_2": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "'Rani — I know I am not good at saying these things while you can hear me. So I am saying it now in writing, which is easier for a coward like me. I loved the thirty-two years. Every single one. Don't be so quiet without me.'",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "Oh. There it is. He knew. He just couldn't say it face to face.", "requires_stat": 0}
            ],
            "choices": [
              {"id": "c2a", "text": "He wasn't quiet about the important things after all.", "stat_check": null, "next": "sr_end", "effects": {"route_update": {"spirit_resolved": true, "spirit_state": 2}, "stat_modify": {"GRIEF": 1, "EMPATHY": 1}, "add_note": "Letter delivered. He loved the thirty-two years. She heard him, finally.", "set_flag": "mrs_mehta_resolved"}}
            ]
          },
          "sr_end": {
            "speaker": "Spirit — Mrs. Mehta",
            "text": "No. He wasn't. He just needed someone to carry the words the last few steps. Thank you. Go now. I'm going to sleep.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_aftermath": {
        "start": "sa_1",
        "nodes": {
          "sa_1": {
            "speaker": "Mrs. Mehta",
            "text": "She's standing in the light of the lanterns, and she looks — lighter. As if she set something down.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      }
    }
  },

  "raju": {
    "name": "Raju",
    "title": "The Boy on the Temple Steps",
    "portrait_day": "res://assets/sprites/npcs/raju_portrait.png",
    "portrait_spirit": "res://assets/sprites/npcs/raju_spirit_portrait.png",
    "spawn_location_day": {"x": 280, "y": 160},
    "spawn_location_night": {"x": 280, "y": 160},
    "dialogue_trees": {

      "first_meeting": {
        "start": "r1_caught",
        "nodes": {
          "r1_caught": {
            "speaker": "Raju",
            "text": "I didn't take anything. I was just... smelling it. The tiffin.",
            "voice_interjections": [
              {"skill": "NOSE", "text": "He's lying. The tiffin on the bottom of the stack is lighter than it should be. One container is nearly empty.", "requires_stat": 1},
              {"skill": "STREET_SENSE", "text": "Dirty sneakers, school bag, uniform three days unwashed. He's not homeless — he's run away.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "You're hungry. That's all right.", "stat_check": null, "next": "r1_generous", "effects": {"stat_modify": {"EMPATHY": 1}}},
              {"id": "c1b", "text": "[NOSE 1] I can see the container is empty. Who taught you to eat so quietly?", "stat_check": {"skill": "NOSE", "threshold": 1}, "next": "r1_caught_gentle", "fail_next": "r1_generous", "effects": {}},
              {"id": "c1c", "text": "That tiffin was for Flat 2A.", "stat_check": null, "next": "r1_strict", "effects": {}}
            ]
          },
          "r1_generous": {
            "speaker": "Raju",
            "text": "I'll pay you back. I have money at home.",
            "voice_interjections": [
              {"skill": "STREET_SENSE", "text": "He said 'at home' not 'I don't have money.' He has a home. He just isn't in it.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "Don't worry about it. I'll bring extra tomorrow.", "stat_check": null, "next": "r1_end_warm", "effects": {"route_update": {"day_state": 1, "trust_level": 1}, "add_note": "He's a runaway, not homeless. Has a home. Too proud to say more."}}
            ]
          },
          "r1_caught_gentle": {
            "speaker": "Raju",
            "text": "...My ammi taught me. She said eating quietly was polite. I was trying to put it back before you noticed.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "Your ammi sounds like a careful person. I'll bring you your own tomorrow.", "stat_check": null, "next": "r1_end_warm", "effects": {"route_update": {"day_state": 1, "trust_level": 2}, "add_note": "His mother taught him to eat quietly. He's been here a few days."}}
            ]
          },
          "r1_strict": {
            "speaker": "Raju",
            "text": "Sorry. Sorry, I'll go.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "Wait — are you all right?", "stat_check": null, "next": "r1_end_warm", "effects": {"route_update": {"day_state": 1}}}
            ]
          },
          "r1_end_warm": {
            "speaker": "Raju",
            "text": "I'm fine. I'm just... between things right now.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "developing": {
        "start": "r2_start",
        "nodes": {
          "r2_start": {
            "speaker": "Raju",
            "text": "You came back. With extra.",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "I said I would. How long have you been sleeping here?", "stat_check": null, "next": "r2_how_long", "effects": {}}
            ]
          },
          "r2_how_long": {
            "speaker": "Raju",
            "text": "Nine days. But I'm not sleeping here. I'm thinking.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "That distinction matters to him. He's not running — in his mind, he's making a decision.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "Nine days is a long time to think.", "stat_check": null, "next": "r2_why_left", "effects": {}},
              {"id": "c2b", "text": "[STREET_SENSE 2] What are you thinking about?", "stat_check": {"skill": "STREET_SENSE", "threshold": 2}, "next": "r2_why_left_direct", "fail_next": "r2_why_left", "effects": {}}
            ]
          },
          "r2_why_left": {
            "speaker": "Raju",
            "text": "They sent me to this boarding school. To get a good future. But I was the only boy from here. Nobody talked to me like — like I was from anywhere.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "Loneliness as a form of erasure. He left to find himself and ended up more lost.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c3a", "text": "So you left.", "stat_check": null, "next": "r2_end", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}, "add_note": "Ran from boarding school. Felt invisible, erased. Has a family waiting."}},
              {"id": "c3b", "text": "[EMPATHY 2] And now nobody knows where you are.", "stat_check": {"skill": "EMPATHY", "threshold": 2}, "next": "r2_end_empathy", "fail_next": "r2_end", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}, "stat_modify": {"EMPATHY": 1}}}
            ]
          },
          "r2_why_left_direct": {
            "speaker": "Raju",
            "text": "I'm thinking about whether going home means I lost. Or whether I was allowed to want to come home.",
            "voice_interjections": [],
            "choices": [
              {"id": "c3a", "text": "Wanting to go home doesn't make you a loser.", "stat_check": null, "next": "r2_end", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}, "add_note": "He thinks going home = admitting defeat. Pride vs longing."}}
            ]
          },
          "r2_end": {
            "speaker": "Raju",
            "text": "...Yeah. I left. I don't know if I want to go back.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "r2_end_empathy": {
            "speaker": "Raju",
            "text": "My ammi doesn't know. My baba will be so angry. He saved for two years for that school.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "trust": {
        "start": "r3_phone",
        "nodes": {
          "r3_phone": {
            "speaker": "Raju",
            "text": "I borrowed a phone from the chai man. To call home. I stood there for four minutes and then I gave it back.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "He dialled and couldn't do it. The pride and the longing are equally strong.", "requires_stat": 2},
              {"skill": "GRIEF", "text": "Four minutes is a long time to hold a phone and decide not to speak.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "What stopped you?", "stat_check": null, "next": "r3_stopped", "effects": {}}
            ]
          },
          "r3_stopped": {
            "speaker": "Raju",
            "text": "I didn't know what to say after 'hello.' Everything after 'hello' would have to be an explanation.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "'Hello' might be enough.", "stat_check": null, "next": "r3_end", "effects": {"route_update": {"trust_level": 2, "day_state": 3}}},
              {"id": "c2b", "text": "[STREET_SENSE 2] They already know you're coming home. They're just waiting for the call.", "stat_check": {"skill": "STREET_SENSE", "threshold": 2}, "next": "r3_end_sense", "fail_next": "r3_end", "effects": {"route_update": {"trust_level": 3, "day_state": 3}, "add_note": "He needs courage to call. The words 'hello' are the whole door."}}
            ]
          },
          "r3_end": {
            "speaker": "Raju",
            "text": "Maybe. I'll think about it.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "r3_end_sense": {
            "speaker": "Raju",
            "text": "How do you know that?",
            "voice_interjections": [],
            "choices": [
              {"id": "c3a", "text": "Because you're their son. You could call ten years later and they'd pick up.", "stat_check": null, "next": "r3_end_final", "effects": {}}
            ]
          },
          "r3_end_final": {
            "speaker": "Raju",
            "text": "...",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "He's crying. Very quietly. Like someone who was taught to eat quietly.", "requires_stat": 2}
            ],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_not_ready": {
        "start": "sn_1",
        "nodes": {
          "sn_1": {
            "speaker": null,
            "text": "A small shape sits on the spirit-steps. He's holding something small and luminous — you can't tell what it is yet.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_intro": {
        "start": "si_1",
        "nodes": {
          "si_1": {
            "speaker": "Spirit — Raju",
            "text": "You can see me here too. I wondered if you would.",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "What are you holding?", "stat_check": null, "next": "si_2", "effects": {"route_update": {"spirit_state": 1}}}
            ]
          },
          "si_2": {
            "speaker": "Spirit — Raju",
            "text": "A phone. But here it doesn't ring. I've been carrying the call I didn't make.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "The unmade call is heavier than any call you make. It lives in the gap.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "Can I deliver it for you?", "stat_check": null, "next": "si_end", "effects": {}}
            ]
          },
          "si_end": {
            "speaker": "Spirit — Raju",
            "text": "You can't call for me. But maybe you can show me how it goes. Come back tomorrow.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_resolution": {
        "start": "sr_1",
        "nodes": {
          "sr_1": {
            "speaker": "Spirit — Raju",
            "text": "I'm ready to call. I just need — I need to hear myself do it. Can you be here?",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "I'm here. Say 'hello.'", "stat_check": null, "next": "sr_2", "effects": {}}
            ]
          },
          "sr_2": {
            "speaker": "Spirit — Raju",
            "text": "...Hello? Ammi? It's me. ...Yes. Yes, I know. I'm coming home.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "There it is. The whole weight of nine days in four words.", "requires_stat": 0}
            ],
            "choices": [
              {"id": "c2a", "text": "(Say nothing. Let him have this.)", "stat_check": null, "next": "sr_end", "effects": {"route_update": {"spirit_resolved": true, "spirit_state": 2}, "set_flag": "raju_resolved", "add_note": "He made the call. He's going home.", "stat_modify": {"EMPATHY": 1}}}
            ]
          },
          "sr_end": {
            "speaker": "Spirit — Raju",
            "text": "The phone vanished. I think — I think it worked. Go. I'm going to go find a real phone now.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_aftermath": {
        "start": "sa_1",
        "nodes": {
          "sa_1": {
            "speaker": null,
            "text": "The steps are empty. He's gone home.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      }
    }
  },

  "desai": {
    "name": "Desai Sahib",
    "title": "The Clerk at Window 3",
    "portrait_day": "res://assets/sprites/npcs/desai_portrait.png",
    "portrait_spirit": "res://assets/sprites/npcs/desai_spirit_portrait.png",
    "spawn_location_day": {"x": 380, "y": 120},
    "spawn_location_night": {"x": 380, "y": 120},
    "dialogue_trees": {

      "first_meeting": {
        "start": "d1_start",
        "nodes": {
          "d1_start": {
            "speaker": "Desai Sahib",
            "text": "New delivery person, hah? Your parking permit is not valid for this lane. I can overlook it... for a consideration.",
            "voice_interjections": [
              {"skill": "STREET_SENSE", "text": "Standard shakedown. But his hands are shaking too. The villain in this scene is tired.", "requires_stat": 1},
              {"skill": "NOSE", "text": "Hospital disinfectant under the sweat. He came from somewhere before work.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c1a", "text": "How much of a consideration?", "stat_check": null, "next": "d1_bribe", "effects": {}},
              {"id": "c1b", "text": "[NOSE 2] You smell like Nair Hospital. Long morning?", "stat_check": {"skill": "NOSE", "threshold": 2}, "next": "d1_hospital", "fail_next": "d1_bribe", "effects": {}},
              {"id": "c1c", "text": "I'll move the bicycle.", "stat_check": null, "next": "d1_leave", "effects": {}}
            ]
          },
          "d1_bribe": {
            "speaker": "Desai Sahib",
            "text": "One hundred rupees. And you can come and go freely.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "(Pay it. It's easier.)", "stat_check": null, "next": "d1_paid", "effects": {"route_update": {"day_state": 1}, "add_note": "Took a small bribe. Tired, not cruel."}},
              {"id": "c2b", "text": "I don't have it today. I'll bring it tomorrow.", "stat_check": null, "next": "d1_defer", "effects": {"route_update": {"day_state": 1}}}
            ]
          },
          "d1_hospital": {
            "speaker": "Desai Sahib",
            "text": "...What? I don't— yes. I had an appointment. Never mind that.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "He flinched. That question landed somewhere real.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "I hope it was a good appointment.", "stat_check": null, "next": "d1_hospital_soft", "effects": {"route_update": {"day_state": 1, "trust_level": 1, "unlocked": true}, "add_note": "Goes to Nair Hospital. Won't say why. The extortion softened when I mentioned it."}}
            ]
          },
          "d1_hospital_soft": {
            "speaker": "Desai Sahib",
            "text": "...Move your bicycle out of Window 3's eyeline. Window 4 is fine. Go.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "d1_paid": {
            "speaker": "Desai Sahib",
            "text": "Tomorrow, same time, it lapses. Good day.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "d1_defer": {
            "speaker": "Desai Sahib",
            "text": "Tomorrow then. Don't make me come looking.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "d1_leave": {
            "speaker": "Desai Sahib",
            "text": "Good. See you don't forget.",
            "voice_interjections": [],
            "choices": [],
            "next": "END",
            "effects": {"route_update": {"day_state": 1}}
          }
        }
      },

      "developing": {
        "start": "d2_start",
        "nodes": {
          "d2_start": {
            "speaker": "Desai Sahib",
            "text": "You again. You're consistent. I'll give you that.",
            "voice_interjections": [
              {"skill": "NOSE", "text": "Hospital again. More than an appointment. This is routine.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c1a", "text": "I brought you your tiffin. New route — you're on the list now.", "stat_check": null, "next": "d2_tiffin", "effects": {}},
              {"id": "c1b", "text": "[NOSE 2] Nair Hospital again today?", "stat_check": {"skill": "NOSE", "threshold": 2}, "next": "d2_hospital_again", "fail_next": "d2_tiffin", "effects": {}}
            ]
          },
          "d2_tiffin": {
            "speaker": "Desai Sahib",
            "text": "I didn't ask to be on a list.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "I know. It's a gift. First one's free.", "stat_check": null, "next": "d2_end_tiffin", "effects": {"route_update": {"day_state": 2, "trust_level": 1}}}
            ]
          },
          "d2_hospital_again": {
            "speaker": "Desai Sahib",
            "text": "My wife. She's been — she has her treatments on Tuesdays and Fridays.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "He said it quietly. The way people say things they've had to say too many times to cry over anymore.", "requires_stat": 2},
              {"skill": "GRIEF", "text": "He's not angry with you. He's angry with something much larger and taking it out on people at his eye level.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "I'm sorry. That's a hard schedule to carry.", "stat_check": null, "next": "d2_wife_reveal", "effects": {"route_update": {"day_state": 2, "trust_level": 2, "spirit_unlocked": true}, "add_note": "Wife is ill. Treatments Tuesdays and Fridays at Nair Hospital. The bribes are funding it."}}
            ]
          },
          "d2_wife_reveal": {
            "speaker": "Desai Sahib",
            "text": "It is what it is. Don't — don't tell anyone. This is not your business.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "It won't leave this lane.", "stat_check": null, "next": "d2_end_trust", "effects": {}}
            ]
          },
          "d2_end_trust": {
            "speaker": "Desai Sahib",
            "text": "...Leave the tiffin. And come from Window 4 side tomorrow. I'll tell them you're expected.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "d2_end_tiffin": {
            "speaker": "Desai Sahib",
            "text": "...Fine. First one. Leave it.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "trust": {
        "start": "d3_confession",
        "nodes": {
          "d3_confession": {
            "speaker": "Desai Sahib",
            "text": "I've been thinking. What I take from the department — for her treatments. I know what it is. I've known for two years.",
            "voice_interjections": [
              {"skill": "STREET_SENSE", "text": "He didn't just decide to confess. He needed someone who already knew the right amount — not everything, enough.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c1a", "text": "Why are you telling me this?", "stat_check": null, "next": "d3_why", "effects": {}}
            ]
          },
          "d3_why": {
            "speaker": "Desai Sahib",
            "text": "Because you're the only person who brings me food and doesn't want something from me. That's — that means something, strangely.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "Is there another way to fund the treatments?", "stat_check": null, "next": "d3_end", "effects": {"route_update": {"day_state": 3, "trust_level": 3}, "add_note": "He confessed the source of the bribes. Wife's medical costs. Wants a way out."}},
              {"id": "c2b", "text": "[EMPATHY 3] You've been alone with this for two years.", "stat_check": {"skill": "EMPATHY", "threshold": 3}, "next": "d3_end_empathy", "fail_next": "d3_end", "effects": {"route_update": {"day_state": 3, "trust_level": 3}, "stat_modify": {"EMPATHY": 1}}}
            ]
          },
          "d3_end": {
            "speaker": "Desai Sahib",
            "text": "I'm looking into it. There are government schemes I should have applied for. I was too — too proud. Or too frightened.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "d3_end_empathy": {
            "speaker": "Desai Sahib",
            "text": "Two years, four months, and eleven days. I counted.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_not_ready": {
        "start": "sn_1",
        "nodes": {
          "sn_1": {
            "speaker": null,
            "text": "A figure in a government uniform stands very still. He's surrounded by floating papers. They won't stop moving.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_intro": {
        "start": "si_1",
        "nodes": {
          "si_1": {
            "speaker": "Spirit — Desai Sahib",
            "text": "The papers won't stop. Every one of them is a form I filled wrong. Or filled right for the wrong reason.",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "What would make them stop?", "stat_check": null, "next": "si_2", "effects": {"route_update": {"spirit_state": 1}}}
            ]
          },
          "si_2": {
            "speaker": "Spirit — Desai Sahib",
            "text": "I don't know. The form I actually need to fill — the right one — I can never find it.",
            "voice_interjections": [
              {"skill": "STREET_SENSE", "text": "He's looking for a legitimate path. One he should have taken. That's what he needs delivered.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c2a", "text": "Maybe I can find it for you.", "stat_check": null, "next": "si_end", "effects": {}}
            ]
          },
          "si_end": {
            "speaker": "Spirit — Desai Sahib",
            "text": "You would do that. Come back.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_resolution": {
        "start": "sr_1",
        "nodes": {
          "sr_1": {
            "speaker": "Spirit — Desai Sahib",
            "text": "You found it?",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "PM-JAY. National health scheme. She qualifies. You qualify. You always did.", "stat_check": null, "next": "sr_2", "effects": {}}
            ]
          },
          "sr_2": {
            "speaker": "Spirit — Desai Sahib",
            "text": "...I knew about PM-JAY. I never applied because applying meant I was admitting I couldn't afford it myself.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "Pride as its own kind of poverty. He couldn't bear the paperwork of needing help.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "Applying means you love her more than you need to seem fine.", "stat_check": null, "next": "sr_end", "effects": {"route_update": {"spirit_resolved": true, "spirit_state": 2}, "set_flag": "desai_resolved", "add_note": "Spirit delivered: the form he never filled. PM-JAY. He needed permission to need help.", "stat_modify": {"GRIEF": 1}}}
            ]
          },
          "sr_end": {
            "speaker": "Spirit — Desai Sahib",
            "text": "The papers have stopped. ...I'll fill it in the morning. The real one.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_aftermath": {
        "start": "sa_1",
        "nodes": {
          "sa_1": {
            "speaker": null,
            "text": "The papers are gone. He's standing in clear air for the first time in what must feel like years.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      }
    }
  },

  "arjun": {
    "name": "Arjun",
    "title": "The Son Who Came Back",
    "portrait_day": "res://assets/sprites/npcs/arjun_portrait.png",
    "portrait_spirit": "res://assets/sprites/npcs/arjun_spirit_portrait.png",
    "spawn_location_day": {"x": 100, "y": 180},
    "spawn_location_night": {"x": 100, "y": 180},
    "dialogue_trees": {

      "first_meeting": {
        "start": "a1_new",
        "nodes": {
          "a1_new": {
            "speaker": "Arjun",
            "text": "New address. I just moved back. My father lives here — I'll be staying for a while.",
            "voice_interjections": [
              {"skill": "STREET_SENSE", "text": "New to this address, but not new to this city. He knows how to stand on these streets. He grew up here.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "Welcome back. Two portions?", "stat_check": null, "next": "a1_two_portions", "effects": {}},
              {"id": "c1b", "text": "How long have you been away?", "stat_check": null, "next": "a1_away", "effects": {}}
            ]
          },
          "a1_two_portions": {
            "speaker": "Arjun",
            "text": "One. He doesn't eat much. And I'm not sure he'll eat at all if I'm the one who ordered it.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "Something happened between them. He came back anyway. That means something.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "I'll bring two anyway. He might surprise you.", "stat_check": null, "next": "a1_end", "effects": {"route_update": {"day_state": 1, "trust_level": 1, "unlocked": true}, "add_note": "Returned from abroad. Complicated relationship with his father. Father may not accept food."}}
            ]
          },
          "a1_away": {
            "speaker": "Arjun",
            "text": "Eight years. I was in Canada. I came back when my father's health started — well. I came back.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "He stopped himself from finishing that sentence. Whatever he came back for, it's complicated by grief.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "That's a long time. And a long way.", "stat_check": null, "next": "a1_end", "effects": {"route_update": {"day_state": 1, "unlocked": true}}}
            ]
          },
          "a1_end": {
            "speaker": "Arjun",
            "text": "Yes. Well. Leave the tiffin at the door. We'll... sort it out.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "developing": {
        "start": "a2_start",
        "nodes": {
          "a2_start": {
            "speaker": "Arjun",
            "text": "He ate from the tiffin. He didn't say anything about it. But he ate.",
            "voice_interjections": [
              {"skill": "NOSE", "text": "The container you're collecting smells of the same sabzi you've been sending. He ate exactly his portion and no more. Neither wasteful nor reaching for seconds — the discipline of a man sitting with his pride.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c1a", "text": "That's something.", "stat_check": null, "next": "a2_that_something", "effects": {}}
            ]
          },
          "a2_that_something": {
            "speaker": "Arjun",
            "text": "My mother used to say that with him. 'It's something. Take it.' She was very good at reading the space between what he said and what he meant.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "Past tense. She's gone.", "requires_stat": 0}
            ],
            "choices": [
              {"id": "c2a", "text": "Your mother — she passed?", "stat_check": null, "next": "a2_mother", "effects": {}}
            ]
          },
          "a2_mother": {
            "speaker": "Arjun",
            "text": "Six years ago. I didn't come back for the funeral. I told myself I couldn't afford the flight. That was — it wasn't true.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "He's carrying this like a stone he can't put down.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c2a", "text": "Does your father know you wanted to come?", "stat_check": null, "next": "a2_father_knows", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}, "add_note": "Wasn't at mother's funeral 6 years ago. His reason was a lie. Father doesn't know he wanted to come."}},
              {"id": "c2b", "text": "[GRIEF 1] That kind of regret doesn't have a name in English.", "stat_check": {"skill": "GRIEF", "threshold": 1}, "next": "a2_grief_response", "fail_next": "a2_father_knows", "effects": {"route_update": {"day_state": 2, "spirit_unlocked": true}}}
            ]
          },
          "a2_father_knows": {
            "speaker": "Arjun",
            "text": "No. He thinks I didn't care. I've let him think that for six years.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "a2_grief_response": {
            "speaker": "Arjun",
            "text": "No. In Hindi either. I've looked.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "trust": {
        "start": "a3_start",
        "nodes": {
          "a3_start": {
            "speaker": "Arjun",
            "text": "I tried to talk to him last night. About Amma. He left the room.",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "He's not ready yet?", "stat_check": null, "next": "a3_ready", "effects": {}},
              {"id": "c1b", "text": "[EMPATHY 2] Or maybe he's too ready — he's been sitting with it alone for six years.", "stat_check": {"skill": "EMPATHY", "threshold": 2}, "next": "a3_empathy", "fail_next": "a3_ready", "effects": {}}
            ]
          },
          "a3_ready": {
            "speaker": "Arjun",
            "text": "Maybe. Or maybe I said it wrong. I don't know how to talk to him anymore. I forgot the language, somehow.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "Maybe the language was always actions, not words.", "stat_check": null, "next": "a3_end", "effects": {"route_update": {"day_state": 3, "trust_level": 2}}}
            ]
          },
          "a3_empathy": {
            "speaker": "Arjun",
            "text": "...Both of us have been sitting alone with it. That's — I hadn't thought of it that way. He lost her too.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "The door between you is the same door. Just approach from the other side.", "stat_check": null, "next": "a3_end_empathy", "effects": {"route_update": {"day_state": 3, "trust_level": 3}, "add_note": "The door is the same door — father and son both standing at opposite sides."}}
            ]
          },
          "a3_end": {
            "speaker": "Arjun",
            "text": "He used to come fix things in my room without asking. I hated it. Now I'd give anything to hear him puttering around.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          },
          "a3_end_empathy": {
            "speaker": "Arjun",
            "text": "The same door. ...I'll try again tonight.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_not_ready": {
        "start": "sn_1",
        "nodes": {
          "sn_1": {
            "speaker": null,
            "text": "A figure stands before a door that won't open. He's been knocking for a long time.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_intro": {
        "start": "si_1",
        "nodes": {
          "si_1": {
            "speaker": "Spirit — Arjun",
            "text": "I've been standing here for six years. The door looks like our house. But it won't open.",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "What would open it?", "stat_check": null, "next": "si_2", "effects": {"route_update": {"spirit_state": 1}}}
            ]
          },
          "si_2": {
            "speaker": "Spirit — Arjun",
            "text": "Saying the thing I never said. But I can't say it until he hears it.",
            "voice_interjections": [
              {"skill": "EMPATHY", "text": "He needs the door to open from the inside. Someone on the other side has to be listening.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c2a", "text": "Say it to me. I'll carry it to him.", "stat_check": null, "next": "si_end", "effects": {}}
            ]
          },
          "si_end": {
            "speaker": "Spirit — Arjun",
            "text": "Come back. I need a little more time to find the words.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_resolution": {
        "start": "sr_1",
        "nodes": {
          "sr_1": {
            "speaker": "Spirit — Arjun",
            "text": "I found the words. I want to say them and I want you to deliver them.",
            "voice_interjections": [],
            "choices": [
              {"id": "c1a", "text": "I'm ready.", "stat_check": null, "next": "sr_2", "effects": {}}
            ]
          },
          "sr_2": {
            "speaker": "Spirit — Arjun",
            "text": "Tell him: I was a coward, Pitaji. I was afraid you'd see how sorry I was. I came back because I'm done being afraid of you seeing me.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "The truth that was too heavy to carry alone. Now it has wheels.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "(Carry the words to Pitaji's door in the spirit-world.)", "stat_check": null, "next": "sr_3", "effects": {}}
            ]
          },
          "sr_3": {
            "speaker": "NARRATOR",
            "text": "You walk to the other side of the door. On this side, an old man in the spirit-city. He heard. He was always on the other side, also waiting.",
            "voice_interjections": [],
            "choices": [
              {"id": "c3a", "text": "(The door opens.)", "stat_check": null, "next": "sr_end", "effects": {"route_update": {"spirit_resolved": true, "spirit_state": 2}, "set_flag": "arjun_resolved", "add_note": "The door opened. Both men were waiting on opposite sides.", "stat_modify": {"GRIEF": 1, "EMPATHY": 1}}}
            ]
          },
          "sr_end": {
            "speaker": "Spirit — Arjun",
            "text": "Oh. ...Oh. He was right there.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "spirit_aftermath": {
        "start": "sa_1",
        "nodes": {
          "sa_1": {
            "speaker": null,
            "text": "The door stands open. Both of them are inside.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      }
    }
  },

  "champa": {
    "name": "Champa Tai",
    "title": "The Tea Stall at the Corner",
    "portrait_day": "res://assets/sprites/npcs/champa_portrait.png",
    "portrait_spirit": "res://assets/sprites/npcs/champa_spirit_portrait.png",
    "spawn_location_day": {"x": 340, "y": 200},
    "spawn_location_night": {"x": 340, "y": 200},
    "dialogue_trees": {

      "first_meeting": {
        "start": "c1_intro",
        "nodes": {
          "c1_intro": {
            "speaker": "Champa Tai",
            "text": "Arre, you're Babulal's grandchild! You look just like him. Sit, sit — have chai first, tiffin second.",
            "voice_interjections": [
              {"skill": "NOSE", "text": "Cardamom, ginger, and two types of tea leaf. She doesn't cut corners. This stall has standards.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c1a", "text": "You knew my grandfather?", "stat_check": null, "next": "c1_grandpa", "effects": {}},
              {"id": "c1b", "text": "I shouldn't stop — I have deliveries.", "stat_check": null, "next": "c1_busy", "effects": {}}
            ]
          },
          "c1_grandpa": {
            "speaker": "Champa Tai",
            "text": "Twenty-five years I've had this stall. He stopped here every morning. Never took sugar. Said it confused the taste.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "That sounds like him.", "stat_check": null, "next": "c1_end_warm", "effects": {"route_update": {"day_state": 1, "trust_level": 1}, "add_note": "25 years at this stall. Knew Baba well. He took chai without sugar."}}
            ]
          },
          "c1_busy": {
            "speaker": "Champa Tai",
            "text": "Five minutes. The chai is already poured. Your grandfather never said no to chai.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "(Sit down.)", "stat_check": null, "next": "c1_end_warm", "effects": {"route_update": {"day_state": 1, "trust_level": 1}}}
            ]
          },
          "c1_end_warm": {
            "speaker": "Champa Tai",
            "text": "Come every day. I know everyone's business and I'll tell you none of it. But I'll give you the right chai for whatever mood you're in.",
            "voice_interjections": [],
            "choices": [],
            "next": "END"
          }
        }
      },

      "developing": {
        "start": "c2_homesick",
        "nodes": {
          "c2_homesick": {
            "speaker": "Champa Tai",
            "text": "Baba — sorry, I keep calling you that — something in your chai today? It tastes different to me.",
            "voice_interjections": [
              {"skill": "NOSE", "text": "She's not talking about the chai. Something in her mood changed the flavour of the whole interaction.", "requires_stat": 2}
            ],
            "choices": [
              {"id": "c1a", "text": "It tastes the same to me. Why different to you?", "stat_check": null, "next": "c2_why_diff", "effects": {}},
              {"id": "c1b", "text": "[NOSE 2] It's not the chai. What's different today?", "stat_check": {"skill": "NOSE", "threshold": 2}, "next": "c2_nose_direct", "fail_next": "c2_why_diff", "effects": {}}
            ]
          },
          "c2_why_diff": {
            "speaker": "Champa Tai",
            "text": "My sister called from the village this morning. My mother's mango tree finally died. It was forty years old.",
            "voice_interjections": [
              {"skill": "GRIEF", "text": "Forty years. The tree she grew up with. The one whose shade held her whole childhood.", "requires_stat": 1}
            ],
            "choices": [
              {"id": "c2a", "text": "Did you plant it?", "stat_check": null, "next": "c2_tree", "effects": {}}
            ]
          },
          "c2_nose_direct": {
            "speaker": "Champa Tai",
            "text": "Ayo, clever one. My mother's mango tree. Forty years. Gone this morning.",
            "voice_interjections": [],
            "choices": [
              {"id": "c2a", "text": "Forty years is a long life for a tree.", "stat_check": null, "next": "c2_tree", "effects": {}}
            ]
          },

const _imgCache={};
function loadImg(url){ if(_imgCache[url])return _imgCache[url];
  const rec={img:new Image(),ok:false,err:false}; _imgCache[url]=rec;

function paintPortrait(canvas,id,spirit){

  const set=PORTRAIT_URLS[id]; if(!set)return;
  const rec=loadImg(spirit?set.spirit:set.day);
  const blit=()=>{ if(!rec.img.width)return; const W=canvas.width,H=canvas.height;
    const smin=Math.min(rec.img.width,rec.img.height), sx=(rec.img.width-smin)/2, sy=(rec.img.height-smin)/2;
    c.imageSmoothingEnabled=false; c.clearRect(0,0,W,H); c.drawImage(rec.img,sx,sy,smin,smin,0,0,W,H); };
  if(rec.ok) blit(); else if(!rec.err) rec.img.addEventListener("load",blit,{once:true});
}

/* ============================================================
   PIXEL CHARACTER DRAWING  (humanoid, 4-dir, walk frames)
   draws into a given context at (px,py) anchored bottom-center
   ============================================================ */
function px(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x|0,y|0,w,h);}
function drawPerson(c,cx,by,dir,frame,look,opt={}){
  // figure ~14w x 22h, anchored so feet at (cx, by)
  const x=Math.round(cx-7), y=Math.round(by-22);
  const sk=look.skin, hr=look.hair, cl=opt.spirit?look.spirit:look.cloth, cl2=opt.spirit?look.spirit:look.cloth2, ac=look.accent;
  const step=(frame===1)?1:(frame===3?-1:0);
  c.save();
  if(opt.alpha!=null) c.globalAlpha=opt.alpha;
  // shadow
  if(!opt.spirit){c.globalAlpha=(opt.alpha!=null?opt.alpha:1)*0.28;px(c,x+2,by-2,10,3,"#000");c.globalAlpha=(opt.alpha!=null?opt.alpha:1);}
  // legs
  px(c,x+3,y+16,3,6-Math.abs(step),cl2);
  px(c,x+8,y+16,3,6-Math.abs(step>0?step:0),cl2);
  px(c,x+3,y+16+(step>0?1:0),3,5,cl2);
  px(c,x+8,y+16+(step<0?1:0),3,5,cl2);
  // body / clothing
  px(c,x+2,y+8,10,9,cl);
  px(c,x+2,y+8,10,2,cl2);          // shoulder shade
  px(c,x+6,y+9,2,8,ac);            // garment seam / sash
  // arms
  const sw=step;
  px(c,x,y+9+(sw>0?1:0),2,7,cl);
  px(c,x+12,y+9+(sw<0?1:0),2,7,cl);
  px(c,x,y+15+(sw>0?1:0),2,2,sk);  // hands
  px(c,x+12,y+15+(sw<0?1:0),2,2,sk);
  // head
  px(c,x+3,y,8,8,sk);
  // hair / direction
  if(dir==="up"){ px(c,x+3,y-1,8,5,hr); }
  else if(dir==="down"){ px(c,x+3,y-1,8,3,hr);
    px(c,x+4,y+3,1,1,"#1a120c");px(c,x+9,y+3,1,1,"#1a120c"); } // eyes
  else { // side
    px(c,x+3,y-1,8,4,hr);
    const ex=dir==="left"?x+4:x+9; px(c,ex,y+3,1,1,"#1a120c");
  }
  // prop
  if(opt.prop==="tiffin"){ px(c,x+13,y+11,4,5,"#cdd2d6");px(c,x+13,y+11,4,1,ac);px(c,x+13,y+13,4,1,"#8b9398"); }
  if(opt.spirit){
    c.globalAlpha=(opt.alpha!=null?opt.alpha:1)*0.5;
    c.fillStyle=look.spirit; c.fillRect(x-2,y-3,18,26); c.globalAlpha=1;
  }
  c.restore();
}

/* portrait: head & shoulders, bigger, into a 48x48 ctx */
function drawPortrait(c,look,spirit){
  c.clearRect(0,0,48,48);
  c.fillStyle = spirit? "#161a36":"#241a14"; c.fillRect(0,0,48,48);
  // soft vignette
  const g=c.createRadialGradient(24,20,4,24,24,30);
  g.addColorStop(0, spirit?"rgba(140,170,255,.25)":"rgba(232,167,46,.22)"); g.addColorStop(1,"rgba(0,0,0,0)");
  c.fillStyle=g; c.fillRect(0,0,48,48);
  const sk=look.skin,hr=look.hair,cl=spirit?look.spirit:look.cloth,cl2=spirit?look.spirit:look.cloth2,ac=look.accent;
  const ox=12,oy=10,s=3;
  const P=(gx,gy,gw,gh,col)=>{c.fillStyle=col;c.fillRect(ox+gx*s,oy+gy*s,gw*s,gh*s);};
  if(spirit){c.globalAlpha=.5;P(-1,-1,10,13,look.spirit);c.globalAlpha=1;}
  P(1,8,6,5,cl2);            // shoulders
  P(2,8,4,2,cl);
  P(3,9,2,3,ac);            // collar/sash
  P(1,0,6,7,sk);            // face
  P(1,-1,6,2,hr);           // hair top
  P(0,0,1,4,hr); P(7,0,1,4,hr);
  c.fillStyle="#1a120c"; c.fillRect(ox+2*s,oy+3*s,s-1,s-1); c.fillRect(ox+5*s,oy+3*s,s-1,s-1); // eyes
  c.fillStyle="rgba(0,0,0,.25)"; c.fillRect(ox+2*s,oy+6*s,4*s,1); // mouth line
  if(spirit){ c.globalAlpha=.35;c.fillStyle=look.spirit;c.fillRect(0,0,48,48);c.globalAlpha=1; }
}

/* deterministic noise for cobble speckle */
function hash(x,y){let n=x*374761393+y*668265263;n=(n^(n>>13))*1274126177;return ((n^(n>>16))>>>0)/4294967296;}

let starField=[]; for(let i=0;i<70;i++)starField.push({x:Math.random()*VW,y:Math.random()*120,p:Math.random()});

function drawGround(c,night){
  // base
  c.fillStyle=night?"#14152e":"#caa15e"; c.fillRect(0,0,VW,VH);
  // upper "sky/wash" band for depth
  const sky=c.createLinearGradient(0,0,0,VH);
  if(night){sky.addColorStop(0,"#23264f");sky.addColorStop(1,"#0e0f24");}
  else{sky.addColorStop(0,"#e7b15a");sky.addColorStop(1,"#b9824a");}
  c.fillStyle=sky;c.fillRect(0,0,VW,VH);
  // cobble speckle
  for(let y=8;y<VH-6;y+=4){
    for(let x=6;x<VW-6;x+=4){
      const h=hash(x,y);
      if(h>0.62){
        c.fillStyle=night
          ?`rgba(120,130,200,${0.05+h*0.06})`
          :`rgba(90,60,30,${0.06+h*0.10})`;
        c.fillRect(x,y,3,2);
      }
    }
  }
  // main street (lighter path) winding between landmarks
  c.fillStyle=night?"rgba(150,160,230,.06)":"rgba(244,231,207,.12)";
  c.fillRect(60,90,360,40);
  c.fillRect(150,90,40,150);
  c.fillRect(330,120,40,110);
}

function building(c,b,night,opt={}){
