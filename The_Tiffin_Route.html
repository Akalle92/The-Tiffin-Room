/* ============================================================
   ENTITIES / PLAYER
   ============================================================ */
const player={x:206,y:150,w:10,h:6,dir:"down",moving:false,anim:0,fr:0};
const keys={};
let time=0, lastNear=null, moveTarget=null;

function update(dt){
  time+=dt;
  if(mode!=="play"){return;}
  let dx=0,dy=0,sp=0.055*dt;
  if(keys["w"]||keys["arrowup"])dy-=1;
  if(keys["s"]||keys["arrowdown"])dy+=1;
  if(keys["a"]||keys["arrowleft"])dx-=1;
  if(keys["d"]||keys["arrowright"])dx+=1;
  if(!dx&&!dy&&moveTarget){
    const tx=moveTarget.x-(player.x+player.w/2), ty=moveTarget.y-(player.y+player.h/2);
    if(Math.hypot(tx,ty)<3.5){moveTarget=null;} else {dx=tx;dy=ty;}
  }
  player.moving=(dx||dy)!==0;
  const _ox=player.x,_oy=player.y;
  if(dx||dy){
    const l=Math.hypot(dx,dy);dx/=l;dy/=l;
    if(Math.abs(dx)>Math.abs(dy))player.dir=dx<0?"left":"right";else player.dir=dy<0?"up":"down";
    const nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!blocked(nx,player.y,player.w,player.h))player.x=nx;
    if(!blocked(player.x,ny,player.w,player.h))player.y=ny;
    player.anim+=dt; if(player.anim>140){player.anim=0;player.fr=(player.fr+1)%4;}
    if(moveTarget && Math.abs(player.x-_ox)<0.04 && Math.abs(player.y-_oy)<0.04) moveTarget=null; // stuck → stop
  } else {player.fr=0;}
  // nearest npc
  lastNear=nearestNPC();
  updatePrompt();
}
function nearestNPC(){
  let best=null,bd=26*26;
  for(const n of NPCS){
    const r=S.routes[n.id];
    if(S.phase==="night" && !r.met) continue;            // unknown at night
    const cx=player.x+player.w/2, cy=player.y+player.h/2;
    const d=(cx-n.x)**2+(cy-(n.y))**2;
    if(d<bd){bd=d;best=n;}
  }
  return best;
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  const night=S&&S.phase==="night";
  drawCity(bx,night);
  // draw entities sorted by y (painter)
  const ents=[];
  for(const n of NPCS){
    const r=S.routes[n.id];
    if(S.phase==="night"){ if(!r.met) continue; }
    ents.push({y:n.y,draw:()=>drawNPC(n,night)});
  }
  ents.push({y:player.y+player.h,draw:()=>drawPerson(bx,player.x+player.w/2,player.y+player.h,player.dir,player.fr,LOOK.player,
      {prop:S.phase==="day"?"tiffin":null})});
  ents.sort((a,b)=>a.y-b.y);
  for(const e of ents)e.draw();

  // day/night colour grade
  if(night){bx.globalCompositeOperation="multiply";bx.fillStyle="#5b63b0";bx.fillRect(0,0,VW,VH);bx.globalCompositeOperation="source-over";
    bx.fillStyle="rgba(20,21,46,.25)";bx.fillRect(0,0,VW,VH);}
  else{bx.globalCompositeOperation="multiply";bx.fillStyle="#ffe9c0";bx.fillRect(0,0,VW,VH);bx.globalCompositeOperation="source-over";}
  // vignette
  const vg=bx.createRadialGradient(VW/2,VH/2,80,VW/2,VH/2,300);
  vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,night?"rgba(4,4,14,.55)":"rgba(40,20,8,.4)");
  bx.fillStyle=vg;bx.fillRect(0,0,VW,VH);

  // blit scaled
  const scale=Math.max(1,Math.min(Math.floor(cv.width/VW),Math.floor(cv.height/VH)));
  ctx.clearRect(0,0,cv.width,cv.height);
  const dw=VW*scale, dh=VH*scale;
  ctx.drawImage(buf,((cv.width-dw)/2)|0,((cv.height-dh)/2)|0,dw,dh);
}
function drawNPC(n,night){
  const r=S.routes[n.id];
  // gentle idle bob
  const bob=Math.sin(time*0.002+n.x)*0.6;
  const spirit = night;
  const look=LOOK[n.id];
  // facing roughly toward player
  let dir="down"; const cx=player.x+player.w/2;
  if(Math.abs(cx-n.x)>10) dir=cx<n.x?"left":"right";
  if(spirit && !r.spirit_unlocked){
    // faint unknowable shape
    drawPerson(bx,n.x,n.y+bob,dir,0,look,{spirit:true,alpha:0.28});
  } else {
    drawPerson(bx,n.x,n.y+bob,dir,0,look,{spirit:spirit,alpha:spirit?(r.spirit_resolved?0.55:0.92):1});
  }
  // resolved spirit gets a calm halo
  if(spirit&&r.spirit_resolved){const g=bx.createRadialGradient(n.x,n.y-10,2,n.x,n.y-10,26);
    g.addColorStop(0,"rgba(180,210,255,.4)");g.addColorStop(1,"rgba(180,210,255,0)");bx.fillStyle=g;bx.fillRect(n.x-26,n.y-36,52,52);}
}

/* ============================================================
   DIALOGUE ENGINE
   ============================================================ */
const Dlg={
  active:false, npc:null, tree:null, node:null, typing:false, full:"", ti:0, onEndKind:null,
  pickDayTree(r){
    if(r.day_state>=3) return null;            // day-arc complete
    if(r.day_state===0) return "first_meeting";
    if(r.day_state===1) return "developing";
    return "trust";
  },
  pickNightTree(r){
    if(!r.spirit_unlocked) return "spirit_not_ready";
    if(!r.spirit_intro_done) return "spirit_intro";
    if(!r.spirit_resolved) return "spirit_resolution";
    return "spirit_aftermath";
  },
  interact(n){
    const r=S.routes[n.id], data=NPC_DATA[n.id];
    let treeId, kind;
    if(S.phase==="day"){
      if(!r.met){r.met=true;}
      if(r.talked_day===S.day || r.day_state>=3){ kind="idle-day"; }
      else { treeId=this.pickDayTree(r); kind="day"; r.talked_day=S.day; if(!r.day_state){S.deliveries++;} else S.deliveries++; }
    } else {
      if(!r.spirit_unlocked){ this.runMini(data,"spirit_not_ready"); return; }
      if(r.talked_night===S.day){ kind="idle-night"; }
      else { treeId=this.pickNightTree(r); kind="night"; r.talked_night=S.day; }
    }
    if(kind==="idle-day"){ this.runLine(n, idleDay(n.id)); return; }
    if(kind==="idle-night"){ this.runLine(n, idleNight(n.id)); return; }
    const tree=data.dialogue_trees[treeId];
    if(!tree){ this.runLine(n, "…"); return; }
    this.npc=n; this.tree=tree; this.onEndKind=kind;
    this.open(); this.go(tree.start);
    save();
  },
  runMini(data,treeId){ // spirit_not_ready narration
    const n=lastNear; this.npc=n; this.tree=data.dialogue_trees[treeId]; this.onEndKind="mini";
    this.open(); this.go(this.tree.start);
  },
  runLine(n,text){ this.npc=n; this.tree=null; this.onEndKind="line"; this.open();
    this.renderNode({speaker:n? (S.phase==="night"?"Spirit — "+NPC_DATA[n.id].name:NPC_DATA[n.id].name):null,text,voice_interjections:[],choices:[],next:"END"});},
  open(){this.active=true;mode="dialogue";moveTarget=null;$("#dlg").classList.add("show");$("#interactPrompt").classList.remove("show");},
  close(){this.active=false;$("#dlg").classList.remove("show");mode="play";HUD.refresh();save();},
  go(nodeId){
    if(nodeId==="END"||!nodeId){ this.finish(); return; }
    const node=this.tree.nodes[nodeId];
    if(!node){ this.finish(); return; }
    this.node=nodeId;
    if(node.effects) applyEffects(this.npc.id,node.effects);
    this.renderNode(node);
  },
  renderNode(node){
    const isNarr = (node.speaker===null || node.speaker==="NARRATOR");
    const spk=$("#speaker"); const por=$("#portrait");
    if(isNarr){ spk.textContent=""; por.style.visibility="hidden"; }
    else{
      por.style.visibility="visible";
      const spirit = /Spirit/i.test(node.speaker||"");
      spk.className = spirit?"spirit":"";
      const id=this.npc?this.npc.id:null;
      const ttl = id?`<span class="ttl">${NPC_DATA[id].title}</span>`:"";
      spk.innerHTML=(node.speaker||"")+ttl;
      if(id) paintPortrait(por, id, spirit|| (S.phase==="night"));
    }
    // voices
    const vc=$("#dlgVoices");vc.innerHTML="";
    (node.voice_interjections||[]).forEach(v=>{
      if(S.stats[v.skill]>= (v.requires_stat||0)){
        const el=document.createElement("div");el.className="voice";
        el.style.borderColor=SKILL_COLOR[v.skill];el.style.color="#efe4d4";
        el.innerHTML=`<span class="vn" style="color:${SKILL_COLOR[v.skill]}">${v.skill.replace('_',' ')}</span>${v.text}`;
        vc.appendChild(el);
      }
    });
    // text typewriter
    const dt=$("#dlgText"); dt.className= isNarr?"narr":"";
    this.full=node.text||""; this.ti=0; dt.textContent=""; this.typing=true;
    $("#choices").innerHTML=""; $("#continueHint").style.visibility="hidden";
    this._node=node;
    clearInterval(this._typer);
    this._typer=setInterval(()=>{
      if(this.ti>=this.full.length){clearInterval(this._typer);this.typing=false;this.showAfterText();return;}
      dt.textContent+=this.full[this.ti++];
      blip();
    },16);
  },
  skip(){ if(this.typing){clearInterval(this._typer);$("#dlgText").textContent=this.full;this.typing=false;this.showAfterText();} else {this.advance();} },
  showAfterText(){
    const node=this._node;
    const ch=$("#choices");ch.innerHTML="";
    if(node.choices&&node.choices.length){
      node.choices.forEach(c=>{
        const b=document.createElement("button");b.className="choice";
        let tag="";
        if(c.stat_check){const k=c.stat_check.skill,th=c.stat_check.threshold;
          const ok=S.stats[k]>=th;
          tag=`<span class="tag" style="background:${SKILL_COLOR[k]}33;color:${SKILL_COLOR[k]};border:1px solid ${SKILL_COLOR[k]}">${SKILL_SHORT[k]} ${th}${ok?' ✓':''}</span>`;
          if(!ok)b.classList.add("locked");
        }
        // strip leading [SKILL n] label already represented by tag
        let label=c.text.replace(/^\[[A-Z_]+\s*\d+\]\s*/,"");
        b.innerHTML=tag+label;
        b.onclick=()=>this.choose(c);
        ch.appendChild(b);
      });
      $("#continueHint").style.visibility="hidden";
    } else {
      $("#continueHint").style.visibility="visible";
    }
  },
  choose(c){
    let next=c.next;
    if(c.stat_check){
      const ok=S.stats[c.stat_check.skill]>=c.stat_check.threshold;
      if(!ok && c.fail_next) next=c.fail_next;
      HUD.toast(ok?`${c.stat_check.skill.replace('_',' ')} ✓  success`:`${c.stat_check.skill.replace('_',' ')} — not yet`);
    }
    if(c.effects)applyEffects(this.npc.id,c.effects);
    this.go(next);
  },
  advance(){
    const node=this._node;
    if(node.choices&&node.choices.length)return; // must choose
    this.go(node.next||"END");
  },
  finish(){
    const kind=this.onEndKind;
    const id=this.npc?this.npc.id:null;
    this.close();
    if(id){
      const r=S.routes[id];
      // post-conversation feedback
      if(kind==="day"){
        // safety net: the deeper (day 2+) conversation always opens the spirit path,
        // so no storyline can soft-lock on a single dialogue branch.
        if(r.day_state>=2 && !r.spirit_unlocked) r.spirit_unlocked=true;
        if(r.spirit_unlocked && !r.spirit_intro_done)
          HUD.toast(NPC_DATA[id].name+" has something they can't carry. Return after dark.");
      }
      if(kind==="night"){
        if(r.spirit_resolved){ HUD.toast("Delivered. "+NPC_DATA[id].name+" is at peace."); checkEnding(); }
      }
    }
    save();
  }
};
function idleDay(id){
  const r=S.routes[id];
  const lines={
    mrs_mehta:"Come tomorrow, beta. I'll leave the container outside.",
    raju:"Thanks for the food. I'm still… thinking.",
    desai:"That's all for today. Window 4 side, remember.",
    arjun:"Leave it at the door. We'll sort it out.",
    champa:"Drink your chai. Come back tomorrow — I'll read your mood again."
  };
  if(r.day_state>=3) return (r.spirit_unlocked && !r.spirit_resolved)
    ? "There's nothing more to say in daylight. Whatever's left… it waits for the dark."
    : lines[id];
  return lines[id];
}
function idleNight(id){return "The lantern-light hums. There is nothing more to carry tonight.";}

/* ---------- effects ---------- */
function applyEffects(id,fx){
  if(!fx)return; const r=S.routes[id];
  if(fx.route_update)for(const k in fx.route_update){ r[k]=fx.route_update[k]; }
  if(fx.stat_modify)for(const k in fx.stat_modify){ S.stats[k]=Math.max(0,Math.min(5,(S.stats[k]||0)+fx.stat_modify[k])); HUD.toast(k.replace('_',' ')+" +"+fx.stat_modify[k]); }
  if(fx.set_flag) S.flags[fx.set_flag]=true;
  if(fx.add_note && r.notes.indexOf(fx.add_note)<0) r.notes.push(fx.add_note);
  HUD.refresh();
}

/* ============================================================
   DAY / NIGHT / REST
   ============================================================ */
function rest(){
  if(mode!=="play")return;
  if(S.phase==="day"){
    fadeTo(()=>{ S.phase="night"; placePlayer(); HUD.refresh(); HUD.toast("Night falls. The city dreams — and you can walk its dream.");save(); });
  } else {
    fadeTo(()=>{
      // resolve a new dawn
      S.day++; S.phase="day"; placePlayer(); HUD.refresh();
      HUD.toast("Day "+S.day+". The route begins again."); save();
    });
  }
}
function placePlayer(){ player.x=206;player.y=152;player.dir="up"; }

/* ============================================================
   JOURNAL
   ============================================================ */
const Journal={
  open(){if(mode==="dialogue")return; this._prev=mode; mode="journal";$("#journal").classList.add("show");this.tab(this._tab||"routes");},
  close(){$("#journal").classList.remove("show");mode="play";},
  _tab:"routes",
  tab(t){this._tab=t;document.querySelectorAll(".jtab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
    const body=$("#jbody");body.innerHTML="";
    if(t==="routes")this.routes(body);else this.skills(body);},
  routes(body){
    for(const id of ORDER){
      const r=S.routes[id],d=NPC_DATA[id];
      const card=document.createElement("div");card.className="routeCard";
      let badge,bc;
      if(r.spirit_resolved){badge="At peace";bc="b-done";}
      else if(r.spirit_unlocked&&S.phase!=null&&(r.spirit_intro_done||S.phase==="night")){badge="Spirit waiting";bc="b-spirit";}
      else if(r.met&&r.day_state>0){badge="On the route";bc="b-prog";}
      else{badge=r.met?"Met":"Not yet met";bc="b-new";}
      // avatar
      const av=document.createElement("canvas");av.width=40;av.height=40;av.className="rc-av";
      paintPortrait(av, id, r.spirit_resolved);
      const steps=[0,1,2].map(i=>`<div class="rc-step ${r.day_state>i?'on':''}"></div>`).join("")+
        `<div class="rc-step ${r.spirit_unlocked?'spirit':''}"></div>`+
        `<div class="rc-step ${r.spirit_resolved?'spirit':''}"></div>`;
      const notes=r.met? (r.notes.length?r.notes.map(n=>`<li>${n}</li>`).join(""):`<li class="muted">No notes yet — talk and listen.</li>`)
                       : `<li class="muted">Somewhere on Babulal's old route.</li>`;
      card.innerHTML=`<div class="rc-top"></div>
        <div class="rc-track">${steps}</div>
        <ul class="rc-notes">${notes}</ul>`;
      const top=card.querySelector(".rc-top");top.appendChild(av);
      const nm=document.createElement("div");nm.className="rc-name";
      nm.innerHTML=(r.met?d.name:"? ? ?")+`<span class="t">${r.met?d.title:"unknown to you"}</span>`;
      top.appendChild(nm);
      const bd=document.createElement("span");bd.className="rc-badge "+bc;bd.textContent=badge;top.appendChild(bd);
      body.appendChild(card);
    }
  },
  skills(body){
    const intro=document.createElement("p");intro.className="muted";intro.style.marginBottom="12px";
    intro.style.lineHeight="1.5";
    intro.textContent="Your grandfather left more than a route. These are the voices you deliver with — they speak up when you're sharp enough to hear them. They grow as you listen.";
    body.appendChild(intro);
    for(const k of SKILLS){
      const v=S.stats[k];
      const card=document.createElement("div");card.className="skillCard";
      const samp=SKILL_VOICES[k]?SKILL_VOICES[k][0]:"";
      let pips="";for(let i=0;i<5;i++)pips+=`<i style="background:${i<v?SKILL_COLOR[k]:''}"></i>`;
      card.innerHTML=`<div class="sk-orb" style="background:${SKILL_COLOR[k]};box-shadow:0 0 12px ${SKILL_COLOR[k]}"></div>
        <div><div class="sk-nm" style="color:${SKILL_COLOR[k]}">${k.replace('_',' ')}</div>
        <div class="sk-pips">${pips}</div>
        <div class="sk-desc">${SKILL_DESC[k]}<br><span style="opacity:.7">“${samp}”</span></div></div>`;
      body.appendChild(card);
    }
  }
};

/* ============================================================
   CINEMATICS  (intro, ending, about)
   ============================================================ */
const dawnArt = KEYART, nightArt = paintScene(true);
function paintScene(night){
  const c=document.createElement("canvas");c.width=VW;c.height=VH;const g=c.getContext("2d");g.imageSmoothingEnabled=false;
  drawCity(g,night);
  if(night){g.globalCompositeOperation="multiply";g.fillStyle="#5b63b0";g.fillRect(0,0,VW,VH);}
  else{g.globalCompositeOperation="multiply";g.fillStyle="#ffe3b0";g.fillRect(0,0,VW,VH);}
  g.globalCompositeOperation="source-over";
  return c.toDataURL();
}
const Cine={
  seq:null,i:0,after:null,
  play(lines,after,art){
    this.seq=lines;this.i=0;this.after=after||(()=>{});
    mode="cine";$("#hud").classList.remove("show");$("#touchUI").classList.remove("show");$("#cine").classList.add("show");
    $("#cineArt").style.backgroundImage=`url(${art||dawnArt})`;
    this.step();
  },
  step(){
    if(!this.seq){ return; }
    const t=$("#cineText");
    if(this.i>=this.seq.length){ this.end(); return; }
    const item=this.seq[this.i++];
    if(item.art){$("#cineArt").style.backgroundImage=`url(${item.art})`;}
    t.classList.remove("in");
    setTimeout(()=>{ t.textContent=item.t!==undefined?item.t:item; t.classList.add("in");
      // slow ken-burns
      $("#cineArt").style.transform = (this.i%2?"scale(1.12) translateX(-2%)":"scale(1.08) translateX(2%)");
    },420);
  },
  end(){$("#cine").classList.remove("show");const a=this.after;this.after=null;this.seq=null;if(a)a();},
  intro(){
    const bg=S?S.background:null;
    const L=[
      {t:"Forty years, your grandfather Babulal walked this route.",art:dawnArt},
      {t:"Tiffin by tiffin, he fed a whole neighbourhood — and knew every order by heart.",},
      {t:"Last monsoon, he set down his cart for the last time. The route is yours now.",},
      {t:"On the first morning, you notice what he never told you:",},
      {t:"some of the people on this route are not entirely… here.",art:nightArt},
      {t:"By day you carry food. By the city's dream-light, you carry the things they could never say.",},
      {t:"Five families. Five unfinished deliveries. One season to complete the route.",art:dawnArt}
    ];
    this.play(L,()=>chooseBackground(),dawnArt);
  },
  about(){
    this.play([
      {t:"The Tiffin Route",art:dawnArt},
      "A small narrative game about delivery, grief, and the words we carry for each other.",
      "Walk with WASD or arrow keys. Press E to deliver and listen. J opens your route journal. R rests you into night — and back.",
      "Your five inner voices — Empathy, Nose, Steady Hands, Street Sense, Grief — speak when you're sharp enough to hear them. Choices marked [VOICE n] test a skill.",
      "Help all five families finish what they couldn't. Then the route lets you rest."
    ],()=>{ $("#title").classList.add("show"); mode="title"; }, dawnArt);
  },
  ending(){
    const L=[
      {t:"The last lantern dims. The dream-city loosens its hold.",art:nightArt},
      {t:"Mrs. Mehta sleeps without setting out two cups.",},
      {t:"Raju is on a train, rehearsing the word 'hello.'",},
      {t:"Desai files the right form, in his own name, without shame.",art:dawnArt},
      {t:"A door that stood shut for six years stands open; two men sit inside.",},
      {t:"Champa's kettle waits. 'Back in two weeks,' the note says. 'Kettle is on the left.'",},
      {t:"Your grandfather knew: the route was never only about the food.",},
      {t:"You set down the cart. Tomorrow, someone new will be hungry. For now — rest.",art:dawnArt},
      {t:"— Thank you for walking The Tiffin Route —"}
    ];
    this.play(L,()=>{ Game.toTitle(); }, nightArt);
  }
};
function checkEnding(){
  if(ORDER.every(id=>S.routes[id].spirit_resolved)){
    setTimeout(()=>{ if(mode==="play"){ fadeTo(()=>Cine.ending()); } },1400);
  }
}

/* ---------- background / character choice ---------- */
function chooseBackground(){
  const opts=[
    {k:"EMPATHY",t:"You always read the room before you spoke.",l:"You feel what people won't say."},
    {k:"NOSE",t:"You have your grandfather's nose for the truth.",l:"Kitchens and collars tell you everything."},
    {k:"STREET_SENSE",t:"You grew up in these gullies.",l:"You know who's waiting and who's lying."},
    {k:"GRIEF",t:"You've carried your own losses.",l:"Sorrow doesn't frighten you."}
  ];
  // simple chooser using dialogue overlay styling
  mode="cine";$("#hud").classList.remove("show");$("#touchUI").classList.remove("show");$("#cine").classList.add("show");
  $("#cineArt").style.backgroundImage=`url(${dawnArt})`;
  const t=$("#cineText");t.classList.add("in");
  t.innerHTML=`<div style="font-size:18px;margin-bottom:18px;color:var(--dusk);letter-spacing:.04em">Before the first delivery — what did your grandfather always say you had?</div>
    <div id="bgChoices" style="display:flex;flex-direction:column;gap:10px;max-width:520px;margin:0 auto"></div>`;
  $("#cineHint").style.display="none";
  const box=document.getElementById("bgChoices");
  opts.forEach(o=>{
    const b=document.createElement("button");b.className="btn";b.style.textAlign="left";
    b.innerHTML=`<b style="color:${SKILL_COLOR[o.k]}">${o.t}</b><br><span class="muted" style="font-size:13px">+1 ${o.k.replace('_',' ')} · ${o.l}</span>`;
    b.onclick=()=>{ S.background=o.k; S.stats[o.k]=Math.min(5,S.stats[o.k]+1);
      $("#cineHint").style.display=""; $("#cine").classList.remove("show"); startPlay(true); };
    box.appendChild(b);
  });
}

/* ============================================================
   FADE / FLOW
   ============================================================ */
function fadeTo(fn){const f=$("#fade");f.classList.add("show");setTimeout(()=>{fn();setTimeout(()=>f.classList.remove("show"),60);},560);}

let mode="title"; // title | cine | play | dialogue | journal

const Game={
  newGame(){ $("#title").classList.remove("show"); S=freshState(null);
    fadeTo(()=>Cine.intro()); },
  continueGame(){ const d=loadSave(); if(!d)return; S=d;
    $("#title").classList.remove("show"); fadeTo(()=>startPlay(false)); },
  toTitle(){ S=null; mode="title"; $("#hud").classList.remove("show"); $("#touchUI").classList.remove("show"); $("#settings").classList.remove("show");
    $("#title").classList.add("show"); $("#btnContinue").disabled=!hasSave(); }
};
function startPlay(fresh){
  mode="play"; placePlayer(); $("#hud").classList.add("show"); $("#touchUI").classList.add("show"); HUD.refresh();
  if(fresh){ HUD.toast("Walk the route (WASD). Press E to deliver and listen."); save(); }
}

/* ============================================================
   INPUT
   ============================================================ */
addEventListener("keydown",e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(mode==="cine"){ if(k===" "||k==="enter"){e.preventDefault();Cine.step();} return; }
  if(mode==="dialogue"){
    if(k===" "||k==="enter"){e.preventDefault();Dlg.skip();}
    return;
  }
  if(mode==="paused"){ if(k==="escape")closeSettings(); return; }
  if(mode==="journal"){ if(k==="j"||k==="escape")Journal.close(); return; }
  if(mode==="play"){
    if(k==="e"){ if(lastNear)Dlg.interact(lastNear); }
    else if(k==="j"){ Journal.open(); }
    else if(k==="r"){ rest(); }
    else if(k==="escape"){ openSettings(); }
  }
});
addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});
/* settings / pause + touch buttons */
function openSettings(){ if(mode!=="play")return; mode="paused"; moveTarget=null; $("#settings").classList.add("show"); }
function closeSettings(){ $("#settings").classList.remove("show"); if(mode==="paused")mode="play"; }
function toggleMute(){ muted=!muted; $("#btnMute").textContent="Sound: "+(muted?"Off":"On"); }
$("#tbSet").addEventListener("click",openSettings);
$("#tbJournal").addEventListener("click",()=>{ if(mode==="play")Journal.open(); });
$("#tbRest").addEventListener("click",()=>{ if(mode==="play")rest(); });
$("#btnResume").addEventListener("click",closeSettings);
$("#btnMute").addEventListener("click",toggleMute);
$("#btnTitle").addEventListener("click",()=>{ closeSettings(); Game.toTitle(); });
// click / tap
$("#cine").addEventListener("click",()=>{ if(mode==="cine"&&!document.getElementById("bgChoices"))Cine.step(); });
$("#dlg").addEventListener("click",e=>{ if(mode==="dialogue"&&!e.target.closest(".choice"))Dlg.skip(); });
function canvasPoint(e){const r=cv.getBoundingClientRect();const t=(e.touches&&e.touches[0])?e.touches[0]:e;
  return {x:(t.clientX-r.left)*VW/r.width, y:(t.clientY-r.top)*VH/r.height};}
function onCanvasTap(e){ if(mode!=="play")return; if(e.cancelable)e.preventDefault();
  const p=canvasPoint(e); let best=null,bd=24*24;
  for(const n of NPCS){const rr=S.routes[n.id]; if(S.phase==="night"&&!rr.met)continue;
    const d=(p.x-n.x)**2+(p.y-(n.y-8))**2; if(d<bd){bd=d;best=n;}}
  if(best){ const cx=player.x+player.w/2,cy=player.y+player.h/2;
    if((cx-best.x)**2+(cy-best.y)**2<26*26){ moveTarget=null; Dlg.interact(best); }
    else moveTarget={x:best.x,y:best.y+6};
  } else moveTarget={x:Math.max(8,Math.min(VW-8,p.x)),y:Math.max(8,Math.min(VH-8,p.y))}; }
cv.addEventListener("click",onCanvasTap);
cv.addEventListener("touchstart",onCanvasTap,{passive:false});

/* ============================================================
   AUDIO (tiny optional WebAudio blips)
   ============================================================ */
let actx=null,muted=false;
function blip(){ if(muted)return; try{
  if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
  if(Dlg.ti%2)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type="square";o.frequency.value=380+Math.random()*60;g.gain.value=0.015;
  o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.05);o.stop(actx.currentTime+0.05);
}catch(e){} }

/* ============================================================
   RESIZE + LOOP
   ============================================================ */
function resize(){
  const W=innerWidth,H=innerHeight;
  // keep 16:9-ish, integer scale of 480x270
  let scale=Math.max(1,Math.min(Math.floor(W/VW),Math.floor(H/VH)));
  // allow upscale beyond integer if screen big, but keep pixel via CSS size
  cv.width=VW*scale; cv.height=VH*scale;
  cv.style.width=(VW*scale)+"px"; cv.style.height=(VH*scale)+"px";
  ctx.imageSmoothingEnabled=false;
}
addEventListener("resize",resize); resize();

let last=performance.now();
function loop(t){ const dt=Math.min(50,t-last); last=t;
  update(dt);
  if(S) render();
  else { drawCity(bx,true); ctx.clearRect(0,0,cv.width,cv.height);
    const scale=Math.max(1,Math.min(Math.floor(cv.width/VW),Math.floor(cv.height/VH)));
    ctx.drawImage(buf,((cv.width-VW*scale)/2)|0,((cv.height-VH*scale)/2)|0,VW*scale,VH*scale); }
  requestAnimationFrame(loop);
}
$("#btnContinue").disabled=!hasSave();
requestAnimationFrame(loop);
</script>
