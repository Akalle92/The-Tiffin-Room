<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Tiffin tin icon placeholder -->
  <rect width="128" height="128" fill="#1E0F05"/>
  <!-- Tiffin body -->
  <rect x="28" y="44" width="72" height="52" rx="6" fill="#C87941"/>
  <rect x="28" y="44" width="72" height="8" fill="#E8A060"/>
  <!-- Tiffin lid -->
  <rect x="24" y="36" width="80" height="12" rx="4" fill="#D4893A"/>
  <!-- Handle -->
  <rect x="52" y="20" width="24" height="8" rx="4" fill="#B06030"/>
  <rect x="58" y="16" width="12" height="12" rx="3" fill="none" stroke="#B06030" stroke-width="4"/>
  <!-- Steam lines -->
  <path d="M52 30 Q50 24 52 18" stroke="#FFD580" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M64 30 Q62 22 64 16" stroke="#FFD580" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M76 30 Q74 24 76 18" stroke="#FFD580" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Decorative lines on tin -->
  <line x1="28" y1="68" x2="100" y2="68" stroke="#B06030" stroke-width="2"/>
  <line x1="28" y1="80" x2="100" y2="80" stroke="#B06030" stroke-width="2"/>
</svg>
